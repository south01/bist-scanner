<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}BIST Tarayıcı v2{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  {% block head_extra %}{% endblock %}
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="/" class="header-brand">
      <span class="brand-icon">📊</span>
      <span class="brand-text">BIST <strong>Tarayıcı</strong> <span class="brand-v">v2</span></span>
    </a>
    <nav class="header-nav">
      <a href="/" class="nav-link {% block nav_home %}{% endblock %}">Tarama</a>
      <a href="/backtest" class="nav-link {% block nav_backtest %}{% endblock %}">Backtest</a>
    </nav>
    <div class="header-clock" id="headerClock"></div>
  </div>
</header>

<main class="site-main">
  {% block content %}{% endblock %}
</main>

<footer class="site-footer">
  EOD / Gecikmeli Veri &nbsp;•&nbsp; Kişisel Kullanım &nbsp;•&nbsp; BIST Conviction Scanner v2.0
</footer>

<script>
  // Istanbul clock
  function updateClock() {
    const now = new Date();
    const opts = { timeZone: 'Europe/Istanbul', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false };
    const t = now.toLocaleTimeString('tr-TR', opts);
    const el = document.getElementById('headerClock');
    if (el) el.textContent = '🕐 ' + t + ' İST';
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
{% block scripts %}{% endblock %}
</body>
</html>
